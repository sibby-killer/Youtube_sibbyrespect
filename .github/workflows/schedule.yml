name: SibbyRespect Automation Schedule

on:
  schedule:
    # 4x per day at US Eastern Times (standardized to UTC)
    # 09:00 AM EST → 14:00 UTC
    - cron: '0 14 * * *'
    # 12:00 PM EST → 17:00 UTC
    - cron: '0 17 * * *'
    # 05:00 PM EST → 22:00 UTC
    - cron: '0 22 * * *'
    # 09:00 PM EST → 02:00 UTC (next day)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Optional Topic Override'
        required: false

jobs:
  auto-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to commit tracking files back to repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yt-dlp

      - name: Create Directories
        run: |
          mkdir -p temp output tiktok_bg_videos

      - name: Run Automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.topic }}" ]; then
            python main.py --topic "${{ github.event.inputs.topic }}"
          else
            python main.py
          fi

      - name: Commit tracking files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          for f in used_topics.json used_reddit_posts.json used_tiktok_videos.json used_music.json sfx_manifest.json; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done
          if [ -d "sfx" ]; then git add sfx/ || true; fi
          if [ -d "bg_music" ]; then git add bg_music/ || true; fi
          git diff --quiet && git diff --staged --quiet || git commit -m "Update tracking files"
          git push || echo "Nothing to push"
