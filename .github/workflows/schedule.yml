name: SibbyRespect Auto-Post

on:
  schedule:
    # 4 posts/day at US Eastern times (UTC offsets for EST = +5h, EDT = +4h)
    # 9:00 AM EST  = 14:00 UTC  → also triggers cleanup
    # 12:00 PM EST = 17:00 UTC
    # 5:00 PM EST  = 22:00 UTC
    # 9:00 PM EST  = 02:00 UTC (next day)
    - cron: '0 14 * * *'   # 9AM EST  — with cleanup
    - cron: '0 17 * * *'   # 12PM EST
    - cron: '0 22 * * *'   # 5PM EST
    - cron: '0 2 * * *'    # 9PM EST

  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env
          echo "REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}" >> .env
          echo "REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}" >> .env

      - name: Write Google OAuth token from secret
        run: echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json

      - name: Run cleanup on 9AM run
        if: github.event.schedule == '0 14 * * *'
        env:
          RUN_CLEANUP: "true"
        run: python scheduler.py

      - name: Run normal post
        if: github.event.schedule != '0 14 * * *' || github.event_name == 'workflow_dispatch'
        run: python scheduler.py
